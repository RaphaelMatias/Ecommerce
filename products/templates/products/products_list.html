<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Up Shop</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'products/styles.css' %}">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Header -->
    <header class="bg-dark text-white p-3">
      <div class="container">
        <h1 class="text-center">Up Shop</h1>
      </div>
    </header>

    <!-- Produtos -->
    <section class="container my-5">
      <h2 class="text-center mb-4">Nossos Produtos</h2>
      <div id="product-list" class="row row-cols-1 row-cols-md-3 g-4">
        <!-- Produtos serão inseridos dinamicamente aqui -->
      </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white p-3 mt-5">
      <div class="container text-center">
        <p>&copy; 2025 Up Shop. Todos os direitos reservados.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
      // Fazendo a requisição para a API de produtos
      fetch('/api/products/')
        .then(response => response.json())
        .then(data => {
          const productList = document.getElementById('product-list');
          data.forEach(product => {
            // Criando o HTML para cada produto
            const productHTML = `
              <div class="col">
                <div class="card shadow-sm border-light rounded">
                  <img
                    src="${product.image}"
                    class="card-img-top"
                    alt="${product.name}"
                    style="height: 250px; object-fit: cover; transition: transform 0.3s ease-in-out;"
                    onmouseover="this.style.transform='scale(1.1)'"
                    onmouseout="this.style.transform='scale(1)'"
                  />
                  <div class="card-body">
                    <h5 class="card-title">${product.name}</h5>
                    <p class="card-text">
                      ${product.description.substring(0, 100)}
                    </p>
                    <p class="card-text font-weight-bold">
                      R$ ${product.final_price}
                    </p>
                    <a href="#" class="btn btn-primary">Ver Detalhes</a>
                  </div>
                </div>
              </div>
            `;
            productList.innerHTML += productHTML;
          });
        })
        .catch(error => console.error('Erro ao buscar produtos:', error));
    </script>
  </body>
</html>
